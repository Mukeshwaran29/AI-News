name: 🟢 Uptime Monitor — NSE Sentiment

on:
  schedule:
    # Runs every 5 minutes, all day — the job itself skips outside 6 AM–11:59 PM IST
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  check-uptime:
    name: Ping Site & Alert on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      # ── Step 1: Check if we are within active hours (6 AM – 11:59 PM IST) ──
      - name: 🕐 Check active hours (IST)
        id: hours
        run: |
          # IST = UTC+5:30
          HOUR_IST=$(TZ='Asia/Kolkata' date '+%H')
          MIN_IST=$(TZ='Asia/Kolkata'  date '+%M')
          TOTAL_MIN=$(( 10#$HOUR_IST * 60 + 10#$MIN_IST ))
          START_MIN=$(( 6 * 60 ))       # 6:00 AM IST  = 360 min
          END_MIN=$(( 23 * 60 + 59 ))   # 11:59 PM IST = 1439 min

          echo "Current IST time: ${HOUR_IST}:${MIN_IST}  (${TOTAL_MIN} min)"
          echo "Active window   : 06:00 – 23:59 IST"

          if [ "$TOTAL_MIN" -ge "$START_MIN" ] && [ "$TOTAL_MIN" -le "$END_MIN" ]; then
            echo "✅ Within active hours — proceeding."
            echo "active=true" >> $GITHUB_OUTPUT
          else
            echo "💤 Outside active hours — skipping monitor."
            echo "active=false" >> $GITHUB_OUTPUT
          fi

      # ── Step 2: Ping site (only during active hours) ──
      - name: 🔍 Ping Vercel deployment
        id: ping
        if: steps.hours.outputs.active == 'true'
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            "https://flashnewsai.vercel.app/")

          TIMESTAMP=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %I:%M %p IST')
          echo "status=$HTTP_STATUS"     >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP"   >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Site is UP — HTTP $HTTP_STATUS at $TIMESTAMP"
            echo "up=true" >> $GITHUB_OUTPUT
          else
            echo "🚨 Site is DOWN — HTTP $HTTP_STATUS at $TIMESTAMP"
            echo "up=false" >> $GITHUB_OUTPUT
          fi

      # ── Step 3: Send Gmail alert only if site is DOWN ──
      - name: 📧 Send Gmail alert if site is DOWN
        if: steps.hours.outputs.active == 'true' && steps.ping.outputs.up == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_FROM }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🚨 [DOWN] NSE Sentiment Site is Unreachable"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "NSE Uptime Monitor <${{ secrets.ALERT_EMAIL_FROM }}>"
          html_body: |
            <h2 style="color: #dc2626;">🚨 Your site is DOWN</h2>
            <table style="font-family: monospace; border-collapse: collapse;">
              <tr><td style="padding: 4px 12px 4px 0;"><b>Site</b></td><td>NSE Sentiment Intelligence</td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>URL</b></td><td><a href="https://flashnewsai.vercel.app">https://flashnewsai.vercel.app</a></td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>HTTP Status</b></td><td style="color: #dc2626;">${{ steps.ping.outputs.status }}</td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>Detected At</b></td><td>${{ steps.ping.outputs.timestamp }}</td></tr>
            </table>
            <br/>
            <p>👉 <a href="https://vercel.com/dashboard">Check Vercel Dashboard</a> for deployment logs.</p>
            <p style="color: #6b7280; font-size: 12px;">
              This alert was triggered by your GitHub Actions uptime monitor.<br/>
              Repo: <a href="https://github.com/Mukeshwaran29/AI-News">Mukeshwaran29/AI-News</a><br/>
              Active hours: 6:00 AM – 11:59 PM IST only.
            </p>

      - name: ✅ Log success
        if: steps.hours.outputs.active == 'true' && steps.ping.outputs.up == 'true'
        run: echo "✅ Site is healthy at ${{ steps.ping.outputs.timestamp }}. No alert needed."
