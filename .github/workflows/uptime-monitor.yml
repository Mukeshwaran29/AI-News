name: 🟢 Uptime Monitor — NSE Sentiment

on:
  schedule:
    # Runs every 5 minutes (GitHub's minimum is 5 min)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  check-uptime:
    name: Ping Site & Alert on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🔍 Ping Vercel deployment
        id: ping
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            "https://web-rho-bice-43.vercel.app/")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Site is UP — HTTP $HTTP_STATUS"
            echo "up=true" >> $GITHUB_OUTPUT
          else
            echo "🚨 Site is DOWN — HTTP $HTTP_STATUS"
            echo "up=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚨 Send WhatsApp alert if site is DOWN
        if: steps.ping.outputs.up == 'false'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          MESSAGE="🚨 NSE Sentiment site is DOWN!%0AStatus: HTTP ${{ steps.ping.outputs.status }}%0ATime: $TIMESTAMP%0AURL: https://web-rho-bice-43.vercel.app%0A%0ACheck Vercel dashboard immediately."

          curl -s "https://api.callmebot.com/whatsapp.php?phone=${{ secrets.CALLMEBOT_PHONE }}&text=${MESSAGE}&apikey=${{ secrets.CALLMEBOT_APIKEY }}"

          echo "WhatsApp alert sent!"

      - name: ✅ Log success
        if: steps.ping.outputs.up == 'true'
        run: echo "Site is healthy. No alert needed."
