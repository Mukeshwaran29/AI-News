name: 🟢 Uptime Monitor — NSE Sentiment

on:
  schedule:
    # Runs every 5 minutes (free on public GitHub repos — unlimited minutes)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  check-uptime:
    name: Ping Site & Alert on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 🔍 Ping Vercel deployment
        id: ping
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            "https://web-rho-bice-43.vercel.app/")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 400 ]; then
            echo "✅ Site is UP — HTTP $HTTP_STATUS"
            echo "up=true" >> $GITHUB_OUTPUT
          else
            echo "🚨 Site is DOWN — HTTP $HTTP_STATUS"
            echo "up=false" >> $GITHUB_OUTPUT
          fi

      - name: 📧 Send Gmail alert if site is DOWN
        if: steps.ping.outputs.up == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ALERT_EMAIL_FROM }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🚨 [DOWN] NSE Sentiment Site is Unreachable"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: "NSE Uptime Monitor <${{ secrets.ALERT_EMAIL_FROM }}>"
          html_body: |
            <h2 style="color: #dc2626;">🚨 Your site is DOWN</h2>
            <table style="font-family: monospace; border-collapse: collapse;">
              <tr><td style="padding: 4px 12px 4px 0;"><b>Site</b></td><td>NSE Sentiment Intelligence</td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>URL</b></td><td><a href="https://web-rho-bice-43.vercel.app">https://web-rho-bice-43.vercel.app</a></td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>HTTP Status</b></td><td style="color: #dc2626;">${{ steps.ping.outputs.status }}</td></tr>
              <tr><td style="padding: 4px 12px 4px 0;"><b>Detected At</b></td><td>${{ steps.ping.outputs.timestamp }}</td></tr>
            </table>
            <br/>
            <p>👉 <a href="https://vercel.com/dashboard">Check Vercel Dashboard</a> for deployment logs.</p>
            <p style="color: #6b7280; font-size: 12px;">This alert was triggered by your GitHub Actions uptime monitor.<br/>
            Repo: <a href="https://github.com/Mukeshwaran29/AI-News">Mukeshwaran29/AI-News</a></p>

      - name: ✅ Log success
        if: steps.ping.outputs.up == 'true'
        run: echo "Site is healthy at ${{ steps.ping.outputs.timestamp }}. No alert needed."
